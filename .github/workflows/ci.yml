name: CI for project

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  hello-world:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        run: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Run tests
        run: python test.py
